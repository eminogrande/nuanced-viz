name: Deploy demo to GitHub Pages

# Builds nuanced-viz and generates a self-contained demo page that
# visualizes this repo's own call graph, then publishes it to GitHub Pages.
#
# One-time setup (repo Settings -> Pages): set "Source" to "GitHub Actions".

on:
  push:
    branches: [main]
  workflow_dispatch:

# Allow this workflow to publish to Pages.
permissions:
  contents: read
  pages: write
  id-token: write

# Only one Pages deployment at a time; let in-progress runs finish.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - run: npm ci

      - run: npm run build

      - name: Generate demo site
        run: npm run build:site

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v4
